name: Deploy to Truehost

on:
  push:
    branches:
      - main        # auto-deploys every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:   ${{ secrets.sftp://141.95.45.75 }}
          username: ${{ secrets.uqjhuzrr }}
          password: ${{ secrets.kS6w[59GuZvT]6 }}
          local-dir: ./          # root of your repo
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.github*
            **/supabase/**
            **/COPILOT_PROMPT.md
            **/node_modules/**
