[build]
  functions = "netlify/functions"
  publish = "."

# SPA routing — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Admin routes — serve admin/login if not authenticated
[[redirects]]
  from = "/admin/*"
  to = "/admin/login.html"
  status = 200

# Paystack webhook endpoint
[[redirects]]
  from = "/api/paystack-webhook"
  to = "/.netlify/functions/paystack-webhook"
  status = 200

[functions]
  node_bundler = "esbuild"

[dev]
  port = 8888
